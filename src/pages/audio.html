<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcrição</title>
    <link rel="stylesheet" href="../css/audio.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav>
        <div class="logo">InterGuide</div>
        <div class="menu">
            <a href="dashboard.html">Home</a>
            <a href="login.html" >Login</a>
        </div>
     </nav>

     <!-- CONTEÚDO -->
    <div class="inicio">
     <section class="hero">
        <h1>Transcrição de Áudio</h1>
        <p>Grave uma aula e transforme o áudio em texto.</p>

        

        <!-- PREVIEW -->
        <img id="preview" width="400" alt="Previw da imagem" style="display: none;">

        <!-- BOTÕES -->
        <div class="audio-buttons">
            <button class="btn" id="iniciarBtn">Iniciar</button>
            <button class="btn" id="pararBtn">Parar</button>
        </div>

        <!-- RESULTADO -->
        <div class="card" id="resultado">
            <h2>A transcrição aparecerá aqui...</h2>
         </div>

         <!-- EXPORTAÇÃO -->
        <div class="export-buttons">
            <button class="btn" id="pdfBtn">Exportar PDF</button>
            <button class="btn" id="txtBtn">Exportar TXT</button>
        </div>


     </section>
        <div>
            <img src="./img/aula.png" alt="celular com video da aula" id="aula">
        </div>
