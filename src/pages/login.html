<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <!-- CONTAINER -->
     <section class="form-container">

        <!-- FORMULÁRIO -->
         <form id="loginForm">
            <h1>Login</h1>

            <!-- EMAIL -->
            <input
                type="email"
                id="email"
                placeholder="Digite seu email"
            >

            <!-- SENHA -->
            <input
                type="password"
                id="senha"
                placeholder="Digite sua senha"
            >

            <!-- BOTÃO -->
            <button class="btn" type="submit">Entrar</button>
         </form>

     </section>

    <footer>
        <p>
           &copy;  2026 InterGuide - Projeto Acadêmico. Todos os direitos reservados
            
        </p>
    </footer>
    
     <!-- PARTE DO JAVASCRIPT -->
      <script src="./js/login.js"></script>
     
</body>
</html>
